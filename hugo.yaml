baseURL: "https://dailyderja.com/"
publishDir: "public"
locale: ar
title: The Daily Derja
theme: blowfish
enableEmojis: true
summaryLength: 15
homepage:
  layout: hero
params:
  mainSections:
    - blog
  assets:
    customCSS:
      - "/css/plyr.css"
      - "/css/custom.css"
    customJS:
      - "/js/plyr.js"
      - "/js/audio-init.js"
googleAnalytics: "G-Z4E3K7B8ZR"
imaging:
  anchor: Smart
  quality: 80
  resampleFilter: Lanczos
services:
  disqus:
    shortname: "dailyderja"
outputs:
  home:
    - HTML
    - RSS
    - JSON
    - Sitemap
privacy:
  youTube:
    disable: false
    privacyEnhanced: true
